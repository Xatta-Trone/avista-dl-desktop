name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing tag to publish the installer to, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements_base.txt
            requirements_lock.txt

      - name: Verify bundled assets
        shell: pwsh
        run: |
          $assets = @(
            "app/assets/logo.png",
            "app/assets/logo.ico",
            "app/assets/tabpfn-v2.5-classifier-v2.5_default.ckpt"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset)) {
              throw "Required packaged asset is missing: $asset"
            }
          }

      - name: Install focused test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements_base.txt
          python -m pip install matplotlib scipy scikit-learn imbalanced-learn

      - name: Run packaging and resource tests
        shell: pwsh
        run: |
          python -m pytest `
            tests/test_resources.py `
            tests/test_main.py `
            tests/test_packaging.py `
            tests/test_version_metadata.py `
            -q

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build AVISTA standalone and installer
        shell: pwsh
        run: |
          ./packaging/build_pyinstaller.ps1 `
            -Configuration Release `
            -PythonExecutable python `
            -Clean

      - name: Verify installer output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "installer/AVISTA_Setup.exe")) {
            throw "installer/AVISTA_Setup.exe was not created."
          }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: AVISTA_Setup
          path: installer/AVISTA_Setup.exe
          if-no-files-found: error
          archive: false

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}".StartsWith("v")) {
            $tag = "${{ github.ref_name }}"
          }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            "publish=false" >> $env:GITHUB_OUTPUT
            "tag=" >> $env:GITHUB_OUTPUT
            Write-Host "No release tag resolved. Installer remains available as a workflow artifact."
          }
          elseif (-not $tag.StartsWith("v")) {
            throw "Release tags must start with 'v'. Received: $tag"
          }
          else {
            "publish=true" >> $env:GITHUB_OUTPUT
            "tag=$tag" >> $env:GITHUB_OUTPUT
            Write-Host "Resolved release tag: $tag"
          }

      - name: Publish installer to GitHub Release
        if: steps.release_tag.outputs.publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if (-not (Test-Path -LiteralPath "installer/AVISTA_Setup.exe")) {
            throw "installer/AVISTA_Setup.exe was not created."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG `
              --title $env:RELEASE_TAG `
              --generate-notes
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create GitHub Release for $env:RELEASE_TAG."
            }
          }

          gh release upload $env:RELEASE_TAG `
            installer/AVISTA_Setup.exe `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Could not upload AVISTA_Setup.exe to GitHub Release $env:RELEASE_TAG."
          }
